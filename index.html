<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/main.css">

    <title>Coder'sNotes</title>
</head>

<body>
    <header>
        <div class="container">
            <div class="header-wrapper">
                <a href="/"><img src="./accets/📝Notes.svg" alt="logo"></a>
                <span class="counter">Всего заметок: <small class="count"></small></span>
            </div>
        </div>
    </header>

    <section class="main">
        <div class="container">
            <div class="main-wrapper">
                <form action="post">
                    <div class="inputs">
                        <label for="name">Название заметки</label>
                        <input required type="text" id="name" placeholder="Напишите название новой заметки">
                        <label for="description">Описание новой заметки</label>
                        <textarea required id="description"
                            placeholder="Напишите название новой заметки...."></textarea>
                    </div>
                    <div class="buttons">
                        <fieldset class="fieldset">
                            <legend class="label">Выберите цвет заметки</legend>
                            <ul class="radio-list">
                                <li>
                                    <input class="radio" type="radio" name="color" value="yellow" aria-label="yellow" />
                                </li>
                                <li>
                                    <input class="radio" type="radio" name="color" value="red" aria-label="red" />
                                </li>
                                <li>
                                    <input class="radio" type="radio" name="color" value="green" aria-label="green" />
                                </li>
                                <li>
                                    <input class="radio" type="radio" name="color" value="blue" aria-label="blue" />
                                </li>
                                <li>
                                    <input class="radio" type="radio" name="color" value="purple" aria-label="purple" />
                                </li>
                            </ul>
                            <button type="submit" class="add-note">Добавить заметку</button>
                        </fieldset>
                    </div>
                </form>
                <div class="liked-wrapper">
                    <input type="checkbox" name="liked" id="liked">
                    <label for="liked">Показать только избранные</label>
                </div>
                <div class="notes-wrapper"></div>
                <div class="message-wrapper"></div>
                <div class="delete-wrapper">
                    <div class="del-header">
                        <h3>Удаление заметки</h3>
                        <img src="accets/icons/cancel.svg" alt="cancel" class="cancel">
                    </div>
                    <p class="del-text"></p>
                    <div class="del-but">
                        <button class="cancel">Отменить</button>
                        <button class="delete-btn">Удалить</button>
                    </div>
                </div>
            </div>
        </div>
    </section>


    <script src="./scripts/script.js" type="module"></script>
</body>

</html>

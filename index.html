<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <title>Coder'sNotes</title>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-wrapper">
                <a href="#main"><img src="accets/📝Notes.svg" alt="logo"></a>
                <div class="count">
                    <img src="accets/icons/notes.svg" alt="">
                    <span>Всего заметок: <span class="number">0</span></span>
                </div>
            </div>  
        </div>
    </header>
    
    <section id="main">
        <div class="container">
            <div class="main-wrapper">
                <form action="post">
                    <div class="inputs">
                        <label for="title">Название заметки</label>
                        <input id="title" type="text" placeholder="Напишите название новой заметки...">
                        <label for="content">Описание новой заметки</label>
                        <textarea id="content" placeholder="Напишите описание новой заметки..."></textarea>
                    </div>
                    <div class="buttons">
                        <span class="color">Выбрите цвет заметки</span>
                        <ul class="colors">
                            <li class="selected"><div class="yellow"></div></li>
                            <li><div class="green"></div></li>
                            <li><div class="blue"></div></li>
                            <li><div class="red"></div></li>
                            <li><div class="purple"></div></li>
                        </ul>
                        <button type="submit" class="add">Добавить заметку</button>
                    </div>
                </form>
                <div class="liked">
                    <input type="checkbox" name="liked" id="liked">
                    <label for="liked">Показать только избранные заметки</label>
                </div>
                <div class="notes"></div>
                <div class="text">
                    <p>У вас нет еще ни одной заметки</p>
                    <p>Заполните поля выше и создайте свою первую заметку!</p>`
                </div>
                <div class="messages"></div>
                
                <div class="delete-wrapper">
                    <div class="del-header">
                        <h3>Удаление заметки</h3>
                        <img src="accets/icons/cancel.svg" alt="cancel" class="cancel">
                    </div>
                    <p class="del-text"></p>
                    <div class="del-but">
                        <button class="cancel">Отменить</button>
                        <button class="delete-btn">Удалить</button>
                    </div>
                </div>
                
            </div>
        </div>
    </section>

    <script type="module" src="scripts/script.js"></script>
    <!-- <script type="module" src="scripts/model.js"></script>
    <script type="module" src="scripts/view.js"></script>
    <script type="module" src="scripts/controler.js"></script> -->

</body>
</html>
